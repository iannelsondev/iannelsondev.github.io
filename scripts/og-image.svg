<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111118;stop-opacity:1" />
    </linearGradient>
    <!-- Grid pattern for background texture -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <rect width="1" height="1" x="0" y="0" fill="rgba(99,102,241,0.06)"/>
    </pattern>
    <!-- Dot grid pattern -->
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="rgba(99,102,241,0.12)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Subtle gradient accent line at top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#grad)"/>

  <!-- Left accent bar -->
  <rect x="70" y="160" width="4" height="120" rx="2" fill="url(#grad)" opacity="0.8"/>

  <!-- Name -->
  <text x="95" y="210" font-family="'Bebas Neue', 'Arial Black', sans-serif" font-size="82" font-weight="400" fill="#f1f5f9" letter-spacing="4">IAN NELSON</text>

  <!-- Title -->
  <text x="97" y="268" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="28" font-weight="300" fill="#94a3b8">AI Systems Architect &amp; CTO</text>

  <!-- Divider line -->
  <line x1="97" y1="295" x2="500" y2="295" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>

  <!-- Keywords -->
  <text x="97" y="340" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#6366f1" letter-spacing="1">MULTI-AGENT AI</text>
  <text x="290" y="340" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="rgba(99,102,241,0.4)">|</text>
  <text x="310" y="340" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#06b6d4" letter-spacing="1">ON-PREM LLM INFERENCE</text>
  <text x="590" y="340" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="rgba(99,102,241,0.4)">|</text>
  <text x="610" y="340" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#6366f1" letter-spacing="1">KNOWLEDGE GRAPHS</text>

  <text x="97" y="375" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#06b6d4" letter-spacing="1">AUTONOMOUS SYSTEMS</text>
  <text x="355" y="375" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="rgba(99,102,241,0.4)">|</text>
  <text x="375" y="375" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#6366f1" letter-spacing="1">EDGE INFERENCE</text>
  <text x="555" y="375" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="rgba(99,102,241,0.4)">|</text>
  <text x="575" y="375" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="#06b6d4" letter-spacing="1">RAG PIPELINES</text>

  <!-- Roles -->
  <text x="97" y="440" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#f1f5f9">CTO, R&amp;D — Clarity Innovations</text>
  <text x="97" y="470" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#f1f5f9">CEO — Talon Black</text>
  <text x="97" y="500" font-family="'Poppins', 'Segoe UI', sans-serif" font-size="16" font-weight="300" fill="#94a3b8">26 years across the Intelligence Community, U.S. Army, and private sector</text>

  <!-- URL in bottom right -->
  <text x="1103" y="580" font-family="'JetBrains Mono', 'Courier New', monospace" font-size="16" font-weight="400" fill="rgba(99,102,241,0.5)" text-anchor="end">iannelson.dev</text>

  <!-- Decorative nodes in the right side (resembling the graph from the site) -->
  <circle cx="950" cy="180" r="3" fill="#6366f1" opacity="0.5"/>
  <circle cx="1020" cy="140" r="2.5" fill="#06b6d4" opacity="0.4"/>
  <circle cx="1080" cy="200" r="3.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="990" cy="250" r="2" fill="#06b6d4" opacity="0.5"/>
  <circle cx="1050" cy="290" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="920" cy="300" r="2.5" fill="#06b6d4" opacity="0.3"/>
  <circle cx="1100" cy="350" r="2" fill="#6366f1" opacity="0.5"/>
  <circle cx="970" cy="370" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="1040" cy="420" r="2.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="900" cy="230" r="2" fill="#6366f1" opacity="0.4"/>
  <circle cx="1110" cy="270" r="2" fill="#06b6d4" opacity="0.35"/>

  <!-- Connecting lines between nodes -->
  <line x1="950" y1="180" x2="1020" y2="140" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="1020" y1="140" x2="1080" y2="200" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="950" y1="180" x2="990" y2="250" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="1080" y1="200" x2="1050" y2="290" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="990" y1="250" x2="1050" y2="290" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="920" y1="300" x2="990" y2="250" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="1050" y1="290" x2="1100" y2="350" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="920" y1="300" x2="970" y2="370" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="1100" y1="350" x2="1040" y2="420" stroke="#6366f1" stroke-width="0.5" opacity="0.15"/>
  <line x1="970" y1="370" x2="1040" y2="420" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
  <line x1="900" y1="230" x2="950" y2="180" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="900" y1="230" x2="920" y2="300" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>
  <line x1="1080" y1="200" x2="1110" y2="270" stroke="#6366f1" stroke-width="0.5" opacity="0.2"/>
  <line x1="1110" y1="270" x2="1100" y2="350" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>

  <!-- Bottom gradient accent line -->
  <rect x="0" y="627" width="1200" height="3" fill="url(#grad)"/>
</svg>
