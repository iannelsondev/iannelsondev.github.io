<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow-indigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="400" cy="300" rx="300" ry="200" fill="url(#glow-indigo)" filter="url(#blur-lg)" opacity="0.4"/>
  <ellipse cx="800" cy="350" rx="250" ry="180" fill="url(#glow-cyan)" filter="url(#blur-lg)" opacity="0.3"/>

  <!-- Matrix grid pattern -->
  <g opacity="0.12" stroke="#6366f1" stroke-width="0.5" fill="none">
    <!-- Horizontal lines -->
    <line x1="100" y1="180" x2="500" y2="180"/>
    <line x1="100" y1="220" x2="500" y2="220"/>
    <line x1="100" y1="260" x2="500" y2="260"/>
    <line x1="100" y1="300" x2="500" y2="300"/>
    <line x1="100" y1="340" x2="500" y2="340"/>
    <line x1="100" y1="380" x2="500" y2="380"/>
    <line x1="100" y1="420" x2="500" y2="420"/>
    <line x1="100" y1="460" x2="500" y2="460"/>
    <!-- Vertical lines -->
    <line x1="100" y1="180" x2="100" y2="460"/>
    <line x1="150" y1="180" x2="150" y2="460"/>
    <line x1="200" y1="180" x2="200" y2="460"/>
    <line x1="250" y1="180" x2="250" y2="460"/>
    <line x1="300" y1="180" x2="300" y2="460"/>
    <line x1="350" y1="180" x2="350" y2="460"/>
    <line x1="400" y1="180" x2="400" y2="460"/>
    <line x1="450" y1="180" x2="450" y2="460"/>
    <line x1="500" y1="180" x2="500" y2="460"/>
  </g>

  <!-- Matrix numbers (faint) -->
  <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#6366f1" opacity="0.2">
    <text x="112" y="215">0.73</text><text x="162" y="215">-0.12</text><text x="212" y="215">0.94</text>
    <text x="262" y="215">0.31</text><text x="312" y="215">-0.67</text><text x="362" y="215">0.15</text>
    <text x="112" y="255">-0.45</text><text x="162" y="255">0.88</text><text x="212" y="255">0.02</text>
    <text x="262" y="255">-0.73</text><text x="312" y="255">0.56</text><text x="362" y="255">0.91</text>
    <text x="112" y="295">0.19</text><text x="162" y="295">-0.34</text><text x="212" y="295">0.77</text>
    <text x="262" y="295">0.48</text><text x="312" y="295">0.05</text><text x="362" y="295">-0.62</text>
    <text x="112" y="335">0.61</text><text x="162" y="335">0.43</text><text x="212" y="335">-0.28</text>
    <text x="262" y="335">0.84</text><text x="312" y="335">-0.11</text><text x="362" y="335">0.39</text>
    <text x="112" y="375">-0.07</text><text x="162" y="375">0.66</text><text x="212" y="375">0.53</text>
    <text x="262" y="375">-0.19</text><text x="312" y="375">0.72</text><text x="362" y="375">-0.44</text>
    <text x="112" y="415">0.38</text><text x="162" y="415">-0.51</text><text x="212" y="415">0.87</text>
    <text x="262" y="415">0.14</text><text x="312" y="415">-0.93</text><text x="362" y="415">0.26</text>
    <text x="112" y="455">0.95</text><text x="162" y="455">0.08</text><text x="212" y="455">-0.41</text>
    <text x="262" y="455">0.69</text><text x="312" y="455">0.33</text><text x="362" y="455">-0.78</text>
  </g>

  <!-- Multiplication symbol -->
  <text x="540" y="335" font-family="'JetBrains Mono', monospace" font-size="36" fill="#06b6d4" opacity="0.4" text-anchor="middle">x</text>

  <!-- Second matrix (smaller, right side) -->
  <g opacity="0.12" stroke="#06b6d4" stroke-width="0.5" fill="none">
    <line x1="580" y1="230" x2="740" y2="230"/>
    <line x1="580" y1="270" x2="740" y2="270"/>
    <line x1="580" y1="310" x2="740" y2="310"/>
    <line x1="580" y1="350" x2="740" y2="350"/>
    <line x1="580" y1="390" x2="740" y2="390"/>
    <line x1="580" y1="430" x2="740" y2="430"/>
    <line x1="580" y1="230" x2="580" y2="430"/>
    <line x1="620" y1="230" x2="620" y2="430"/>
    <line x1="660" y1="230" x2="660" y2="430"/>
    <line x1="700" y1="230" x2="700" y2="430"/>
    <line x1="740" y1="230" x2="740" y2="430"/>
  </g>

  <!-- Arrow to output -->
  <line x1="770" y1="330" x2="850" y2="330" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <polygon points="850,325 860,330 850,335" fill="#94a3b8" opacity="0.3"/>

  <!-- Output probability bars -->
  <g font-family="'JetBrains Mono', monospace" font-size="11">
    <text x="880" y="260" fill="#94a3b8" opacity="0.5">Paris</text>
    <rect x="940" y="248" width="160" height="14" rx="2" fill="#6366f1" opacity="0.35"/>
    <text x="1108" y="260" fill="#94a3b8" opacity="0.4">0.94</text>

    <text x="880" y="300" fill="#94a3b8" opacity="0.5">Lyon</text>
    <rect x="940" y="288" width="28" height="14" rx="2" fill="#6366f1" opacity="0.2"/>
    <text x="976" y="300" fill="#94a3b8" opacity="0.3">0.02</text>

    <text x="880" y="340" fill="#94a3b8" opacity="0.5">Berlin</text>
    <rect x="940" y="328" width="17" height="14" rx="2" fill="#6366f1" opacity="0.15"/>
    <text x="964" y="340" fill="#94a3b8" opacity="0.3">0.01</text>

    <text x="880" y="380" fill="#94a3b8" opacity="0.5">London</text>
    <rect x="940" y="368" width="14" height="14" rx="2" fill="#6366f1" opacity="0.12"/>
    <text x="960" y="380" fill="#94a3b8" opacity="0.3">0.008</text>

    <text x="880" y="420" fill="#94a3b8" opacity="0.5">...</text>
  </g>

  <!-- Bracket labels -->
  <text x="90" y="170" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6366f1" opacity="0.3" text-anchor="end">weights</text>
  <text x="580" y="220" font-family="'JetBrains Mono', monospace" font-size="10" fill="#06b6d4" opacity="0.3">input</text>
  <text x="880" y="232" font-family="'JetBrains Mono', monospace" font-size="10" fill="#94a3b8" opacity="0.35">probabilities</text>

  <!-- Floating token chips -->
  <g opacity="0.15">
    <rect x="650" y="80" width="55" height="22" rx="4" fill="#6366f1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="677" y="95" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">The</text>

    <rect x="720" y="80" width="70" height="22" rx="4" fill="#06b6d4" stroke="#06b6d4" stroke-width="0.5"/>
    <text x="755" y="95" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">capital</text>

    <rect x="805" y="80" width="40" height="22" rx="4" fill="#a855f7" stroke="#a855f7" stroke-width="0.5"/>
    <text x="825" y="95" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">of</text>

    <rect x="860" y="80" width="65" height="22" rx="4" fill="#3b82f6" stroke="#3b82f6" stroke-width="0.5"/>
    <text x="892" y="95" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">France</text>

    <rect x="940" y="80" width="40" height="22" rx="4" fill="#0ea5e9" stroke="#0ea5e9" stroke-width="0.5"/>
    <text x="960" y="95" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">is</text>

    <rect x="995" y="80" width="45" height="22" rx="4" fill="#6366f1" stroke="#6366f1" stroke-width="0.5"/>
    <text x="1017" y="95" font-family="'JetBrains Mono', monospace" font-size="10" fill="#e2e8f0" text-anchor="middle">___</text>
  </g>

  <!-- Subtle connecting lines from tokens to matrix -->
  <g stroke="#94a3b8" stroke-width="0.5" opacity="0.06">
    <line x1="677" y1="102" x2="300" y2="180"/>
    <line x1="755" y1="102" x2="660" y2="230"/>
    <line x1="892" y1="102" x2="660" y2="230"/>
  </g>

  <!-- Equation notation at bottom -->
  <text x="600" y="540" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94a3b8" opacity="0.25" text-anchor="middle">
    softmax( Q K^T / sqrt(d_k) ) V
  </text>

  <!-- Subtle scan line effect -->
  <g opacity="0.02">
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#6366f1" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#06b6d4" stroke-width="1"/>
  </g>
</svg>
